        /* й«ҳдә®й…ҚиүІ */

        /* е·ҰеҸійқўжқҝеҸҜиғҪеҗҢж—¶жңүеҶ…е®№дёҚеҗҢдҪҶйғҪйқһз©әпјҲжӣҝжҚўиЎҢпјүвҖ”вҖ”е·Ұдҫ§з”ЁеҲ йҷӨиүІпјҢеҸідҫ§з”Ёж–°еўһиүІ */

        /* и®©иЎҢеҸ·иғҢжҷҜдҝқжҢҒз»ҹдёҖпјҢдёҚеҸ—й«ҳдә®еҪұе“Қ */
        .line-row .line-gutter {

        }

        /* еҚ дҪҚз©әиЎҢдёҚеҠ иғҢжҷҜпјҢдҝқжҢҒе№ІеҮҖ */

        /* з©әиЎҢеңЁи§Ҷи§үдёҠдҝқз•ҷй«ҳеәҰ */

<body>
<div class="container">
    <h1>рҹ“„ д»Јз ҒеҜ№жҜ” В· е№¶жҺ’й«ҳдә®</h1>
    <div class="sub">еҺҹе§Ӣд»Јз Ғ vs дҝ®ж”№еҗҺд»Јз Ғ вҖ” ж”№еҠЁиЎҢй«ҳдә®пјҢж»ҡеҠЁжқЎеҗҢжӯҘпјҢеёҰжңүиЎҢеҸ·</div>

    <!-- иҫ“е…ҘеҢәеҹҹ -->
    <div class="input-area">
        <div class="input-box">
            <label>рҹ“Ң еҺҹе§Ӣд»Јз Ғ <span>е·Ұдҫ§</span></label>
            <textarea id="originalInput" placeholder="зІҳиҙҙеҺҹе§Ӣд»Јз Ғ...">function hello() {
  console.log("Hello");
  // иҝҷжҳҜдёҖиЎҢжіЁйҮҠ
  let a = 42;
}</textarea>
        </div>
        <div class="input-box">
            <label>рҹ“Ң дҝ®ж”№еҗҺд»Јз Ғ <span>еҸідҫ§</span></label>
            <textarea id="modifiedInput" placeholder="зІҳиҙҙдҝ®ж”№еҗҺд»Јз Ғ...">function hello() {
  console.log("Hello, world!");
  let a = 100;
  // ж–°еўһдёҖиЎҢ
  return a;
}</textarea>
        </div>
    </div>

    <div class="action-row">
        <button class="diff-btn" id="diffButton">вңЁ еҜ№жҜ”д»Јз Ғ & й«ҳдә®ж”№еҠЁ</button>
    </div>

    <!-- еҜ№жҜ”йқўжқҝе®№еҷЁ -->
    <div id="diffView" class="diff-view">
        <!-- е·Ұдҫ§еҺҹе§Ӣйқўжқҝ -->
        <div class="panel left-panel" id="leftPanel"></div>
        <!-- еҸідҫ§дҝ®ж”№йқўжқҝ -->
        <div class="panel right-panel" id="rightPanel"></div>
    </div>

    <!-- еӣҫдҫӢ -->
    <div class="legend">
        <span class="legend-item"><span class="color-dot dot-del"></span> еҲ йҷӨ / ж—§иЎҢ</span>
        <span class="legend-item"><span class="color-dot dot-add"></span> ж–°еўһ / ж–°иЎҢ</span>
        <span class="legend-item"><span style="background:#f1f5f9; width:18px;height:18px;border-radius:4px;border:1px solid #cbd5e1;"></span> жңӘж”№еҸҳ</span>
    </div>
</div>

<script>
    (function() {
        // иҺ·еҸ–DOMе…ғзҙ 
        const originalInput = document.getElementById('originalInput');
        const modifiedInput = document.getElementById('modifiedInput');
        const diffButton = document.getElementById('diffButton');
        const leftPanel = document.getElementById('leftPanel');
        const rightPanel = document.getElementById('rightPanel');

        // й”Ғе®ҡж»ҡеҠЁеҗҢжӯҘж Үеҝ—
        let scrollingLocked = false;

        // еҲқе§ӢеҢ–зӨәдҫӢ (з«ӢеҚіжёІжҹ“дёҖж¬Ў)
        window.addEventListener('load', function() {
            renderDiff();
        });

        diffButton.addEventListener('click', renderDiff);

        // ж ёеҝғжёІжҹ“еҮҪж•°
        function renderDiff() {
            const originalText = originalInput.value;
            const modifiedText = modifiedInput.value;

            // дҪҝз”Ё diff еә“иҝӣиЎҢиЎҢзә§еҜ№жҜ” (дҝқз•ҷз©әиЎҢ)
            const diffResult = Diff.diffLines(originalText, modifiedText);

            // жһ„е»әе·ҰеҸіеҜ№йҪҗзҡ„иЎҢж•°з»„ (leftRows, rightRows)
            const leftRows = [];
            const rightRows = [];

            for (let i = 0; i < diffResult.length; i++) {
                const chunk = diffResult[i];

                // дёҚеҸҳеқ—
                if (!chunk.added && !chunk.removed) {
                    const lines = splitLinesPreserveEmpty(chunk.value);
                    lines.forEach(line => {
                        leftRows.push(line);
                        rightRows.push(line);
                    });
                }
                // еҲ йҷӨеқ— (еҸҜиғҪеҗҺйқўзҙ§и·ҹеўһеҠ еқ—)
                else if (chunk.removed) {
                    const removedLines = splitLinesPreserveEmpty(chunk.value);
                    let addedLines = [];

                    // жҺўжөӢдёӢдёҖдёӘеқ—жҳҜеҗҰжҳҜеўһеҠ еқ—
                    if (i + 1 < diffResult.length && diffResult[i + 1].added) {
                        addedLines = splitLinesPreserveEmpty(diffResult[i + 1].value);
                        i++; // и·іиҝҮдёӢдёҖдёӘеўһеҠ еқ—
                    }

                    // еҗҲе№¶еӨ„зҗҶеҲ йҷӨ+еўһеҠ  (й…ҚеҜ№жҳҫзӨәпјҢеҚідҪҝж•°йҮҸдёҚзӯүд№ҹйҖҗиЎҢеҜ№йҪҗ)
                    const maxLen = Math.max(removedLines.length, addedLines.length);
                    for (let j = 0; j < maxLen; j++) {
                        leftRows.push(removedLines[j] !== undefined ? removedLines[j] : '');
                        rightRows.push(addedLines[j] !== undefined ? addedLines[j] : '');
                    }
                }
                // еҚ•зӢ¬зҡ„еўһеҠ еқ— (еүҚйқўжІЎжңүеҲ йҷӨеқ—)
                else if (chunk.added) {
                    const addedLines = splitLinesPreserveEmpty(chunk.value);
                    addedLines.forEach(line => {
                        leftRows.push('');
                        rightRows.push(line);
                    });
                }
            }

            // жё…з©әйқўжқҝ
            leftPanel.innerHTML = '';
            rightPanel.innerHTML = '';

            // еҰӮжһңжІЎжңүд»»дҪ•иЎҢпјҲдёӨдёӘж–Үжң¬йғҪз©әпјүпјҢжҳҫзӨәеҚ дҪҚжҸҗзӨә
            if (leftRows.length === 0) {
                leftRows.push(''); rightRows.push(''); // иҮіе°‘дҝқз•ҷдёҖиЎҢпјҢйҒҝе…Қз©әзҷҪйқўжқҝ
            }

            // жү№йҮҸжёІжҹ“иЎҢ
            for (let i = 0; i < leftRows.length; i++) {
                const leftText = leftRows[i];
                const rightText = rightRows[i];

                // еҲӣе»әе·Ұдҫ§иЎҢ
                const leftRow = createLineRow(i + 1, leftText, 'left', rightText === '' && leftText !== '');
                // еҲӣе»әеҸідҫ§иЎҢ
                const rightRow = createLineRow(i + 1, rightText, 'right', leftText === '' && rightText !== '');

                // йҷ„еҠ й«ҳдә®зұ» (deleted / added) вҖ”вҖ” еңЁcreateLineRowдёӯе·Іж №жҚ®дёҠдёӢж–Үж Үи®°
                // дҪҶжңүдәӣжғ…еҶөе·ҰеҸійғҪйқһз©әдҪҶеҶ…е®№дёҚеҗҢ(жқҘиҮӘй…ҚеҜ№block)пјҢе·Ұдҫ§еә”ж Үи®°еҲ йҷӨпјҢеҸідҫ§ж Үи®°еўһеҠ 
                if (leftText !== '' && rightText !== '' && leftText !== rightText) {
                    // жӣҝжҚўиЎҢпјҡе·ҰзәўпјҢеҸіз»ҝ
                    leftRow.classList.add('deleted');
                    rightRow.classList.add('added');
                } else {
                    // е…¶д»–жғ…еҶө: еҰӮжһңдёҖдҫ§дёәз©әеҸҰдёҖдҫ§йқһз©әпјҢе·Із”ұеҸӮж•°ж Үи®°пјӣиӢҘдёӨдҫ§зӣёеҗҢ(дёҚеҸҳ)пјҢдёҚеҠ зү№ж®Ҡзұ»
                    if (leftText === '' && rightText !== '') {
                        rightRow.classList.add('added');
                    }
                    if (rightText === '' && leftText !== '') {
                        leftRow.classList.add('deleted');
                    }
                }

                leftPanel.appendChild(leftRow);
                rightPanel.appendChild(rightRow);
            }

            // зЎ®дҝқж»ҡеҠЁеҗҢжӯҘйҮҚж–°з»‘е®ҡ (з§»йҷӨд№ӢеүҚзҡ„зӣ‘еҗ¬пјҢйҮҚж–°з»‘е®ҡйҳІжӯўйҮҚеӨҚ)
            bindScrollSync();
        }

        /**
         * еҲӣе»әдёҖиЎҢеҶ…е®№
         * @param {number} lineNum иЎҢеҸ·
         * @param {string} text д»Јз Ғж–Үжң¬
         * @param {string} side 'left' жҲ– 'right' (д»…з”ЁдәҺи°ғиҜ•пјҢдёҚеҪұе“Қзұ»)
         * @param {boolean} isHighlight жҳҜеҗҰж №жҚ®з©әеҜ№йқўж Үи®°й«ҳдә®пјҲеҲқжӯҘж Үи®°пјү
         */
        function createLineRow(lineNum, text, side, isHighlight) {
            const row = document.createElement('div');
            row.className = 'line-row';

            // иЎҢеҸ·
            const gutter = document.createElement('span');
            gutter.className = 'line-gutter';
            gutter.textContent = lineNum;
            row.appendChild(gutter);

            // еҶ…е®№
            const contentSpan = document.createElement('span');
            contentSpan.className = 'line-content';
            // жіЁж„Ҹ: дҪҝз”ЁtextContentдҝқиҜҒдёҚи§Јжһҗhtml, дҝқз•ҷз©әж ј
            contentSpan.textContent = text;
            row.appendChild(contentSpan);

            return row;
        }

        /**
         * еҲҶеүІеӯ—з¬ҰдёІдёәиЎҢпјҢе№¶дҝқз•ҷжң«е°ҫз©әиЎҢ (еҹәдәҺжҚўиЎҢз¬Ұ)
         * дҫӢеҰӮ "a\nb\n" -> ["a","b",""] ; "\n" -> ["",""] 
         */
        function splitLinesPreserveEmpty(str) {
            if (str === '') return [];
            // дҪҝз”ЁжӯЈеҲҷеҲҶеүІпјҢдҝқз•ҷжң«е°ҫз©әдёІ
            const lines = str.split(/\r?\n/);
            // еҰӮжһңеӯ—з¬ҰдёІд»ҘжҚўиЎҢз»“е°ҫпјҢsplitдјҡеңЁжңҖеҗҺеӨҡеҮәдёҖдёӘз©әдёІпјҢжҲ‘д»¬дҝқз•ҷе®ғд»Ҙд»ЈиЎЁжң«е°ҫз©әиЎҢ
            // дҪҶеҰӮжһңжңҖеҗҺдёҖйЎ№жҳҜз©әдё”еҺҹеӯ—з¬ҰдёІжІЎжңүд»ҘжҚўиЎҢз»“е°ҫпјҢеҲҷиҜҙжҳҺжңҖеҗҺеӨҡдҪҷпјҢйңҖиҰҒpop? дҪҶsplitиЎҢдёәж №жҚ®жөҸи§ҲеҷЁз•ҘжңүдёҚеҗҢгҖӮ
            // жӣҙдҝқйҷ©пјҡжЈҖжөӢеҺҹеӯ—з¬ҰдёІжң«е°ҫжҳҜеҗҰжңүжҚўиЎҢпјҢжңүеҲҷдҝқз•ҷжүҖжңүпјҢж— еҲҷеҰӮжһңжңҖеҗҺдёҖйЎ№дёәз©әеҲҷеҺ»жҺү
            const endsWithNewline = str.endsWith('\n') || str.endsWith('\r\n');
            if (!endsWithNewline && lines.length > 0 && lines[lines.length-1] === '') {
                lines.pop();
            }
            return lines;
        }

        // ж»ҡеҠЁеҗҢжӯҘйҖ»иҫ‘
        function bindScrollSync() {
            // е…Ҳз§»йҷӨд№ӢеүҚеҸҜиғҪз»‘е®ҡзҡ„зӣ‘еҗ¬еҷЁ (з®ҖеҚ•зІ—жҡҙ: е…ӢйҡҶжӣҝжҚў? дҪҶзӣҙжҺҘз§»йҷӨзӣ‘еҗ¬дёҚеҘҪж“ҚдҪңпјҢз”ЁдәӢд»¶ж Үеҝ—жҲ–йҮҚж–°иҺ·еҸ–)
            // з§»йҷӨжүҖжңүscrollзӣ‘еҗ¬пјҢз”Ёж–°зӣ‘еҗ¬гҖӮдҪҶж— жі•зӣҙжҺҘз§»йҷӨпјҢжҲ‘д»¬дҪҝз”ЁдёҖдёӘеҢ…иЈ…еҮҪж•°жқҘйҒҝе…ҚеҸ еҠ гҖӮ
            // жңҖз®ҖеҚ•пјҡеңЁжҜҸж¬ЎжёІжҹ“еҗҺз§»йҷӨж—§зҡ„зӣ‘еҗ¬пјҢйҮҚж–°ж·»еҠ гҖӮ
            const left = leftPanel;
            const right = rightPanel;

            // з§»йҷӨд№ӢеүҚз»‘е®ҡзҡ„еӨ„зҗҶеҮҪж•° (йҖҡиҝҮиҺ·еҸ–з»‘е®ҡзҡ„еҮҪж•°жңүзӮ№йә»зғҰпјҢдҪҶжҲ‘д»¬еҸҜд»ҘеңЁеӨ–йғЁдҝқеӯҳеӨ„зҗҶеҮҪж•°еј•з”Ё)
            // дёәдәҶжё…жҷ°пјҢжҲ‘д»¬жҜҸж¬ЎйҮҚж–°з»‘е®ҡеүҚз§»йҷӨжүҖжңүscrollдәӢд»¶пјҲдҪҶеҸҜиғҪз§»йҷӨе…¶д»–ж— е…ізҡ„пјҢдҪҶжІЎе…ізі»пјү
            // жӣҙеҘҪзҡ„ж–№ејҸпјҡдҪҝз”Ёе‘ҪеҗҚеҮҪж•°е№¶removeEventListenerпјҢдҪҶжҲ‘д»¬еҸҜд»ҘеңЁз»‘е®ҡж–°еҮҪж•°еүҚз§»йҷӨжүҖжңүscrollпјҲд»…з§»йҷӨжҲ‘д»¬зҹҘйҒ“зҡ„пјү
            // з®ҖеҚ•еӨ„зҗҶ: з”Ёж Үеҝ—йҳІжӯўйҮҚеӨҚжіЁеҶҢпјҢдҪҶдҝқз•ҷжңҖеҗҺжіЁеҶҢзҡ„дёӨдёӘгҖӮиҝҷйҮҢйҮҮз”ЁжӣҝжҚўзӣ‘еҗ¬: е…Ҳз§»йҷӨж—§зҡ„пјҢеҶҚж·»еҠ ж–°зҡ„
            // еӣ дёәжІЎжңүдҝқеӯҳж—§еҮҪж•°пјҢжҲ‘д»¬дҪҝз”ЁдёҖж¬ЎжҖ§з»‘е®ҡпјҡеңЁе…ЁеұҖдҝқеӯҳеҮҪж•°еј•з”Ё
            if (window._leftScrollHandler) {
                left.removeEventListener('scroll', window._leftScrollHandler);
            }
            if (window._rightScrollHandler) {
                right.removeEventListener('scroll', window._rightScrollHandler);
            }

            function leftScrollHandler() {
                if (!scrollingLocked) {
                    scrollingLocked = true;
                    right.scrollTop = left.scrollTop;
                    right.scrollLeft = left.scrollLeft;   // еҗҢж—¶ж°ҙе№іеҗҢжӯҘ
                    scrollingLocked = false;
                }
            }

            function rightScrollHandler() {
                if (!scrollingLocked) {
                    scrollingLocked = true;
                    left.scrollTop = right.scrollTop;
                    left.scrollLeft = right.scrollLeft;
                    scrollingLocked = false;
                }
            }

            left.addEventListener('scroll', leftScrollHandler);
            right.addEventListener('scroll', rightScrollHandler);

            // дҝқеӯҳд»ҘдҫҝдёӢж¬Ўз§»йҷӨ
            window._leftScrollHandler = leftScrollHandler;
            window._rightScrollHandler = rightScrollHandler;
        }

        // еҲқе§Ӣз»‘е®ҡ (з©әйқўжқҝж—¶д№ҹйңҖиҰҒз»‘е®ҡпјҢдҪҶrenderеҗҺдјҡйҮҚж–°з»‘е®ҡ)
        bindScrollSync();

        // йҷ„еҠ еҠҹиғҪ: зӮ№еҮ»еҜ№жҜ”еҗҺдҝқиҜҒеҗҢжӯҘж»ҡеҠЁиө·зӮ№дёҖиҮҙ (йҮҚзҪ®ж»ҡеҠЁдҪҚзҪ®)
        function resetScroll() {
            leftPanel.scrollTop = 0;
            leftPanel.scrollLeft = 0;
            rightPanel.scrollTop = 0;
            rightPanel.scrollLeft = 0;
        }

        // еңЁжёІжҹ“еҗҺйҮҚзҪ®ж»ҡеҠЁпјҢйҒҝе…Қй”ҷдҪҚ
        const originalRender = renderDiff;
        renderDiff = function() {
            originalRender();
            resetScroll();
        };
        renderDiff(); // йҮҚж–°иөӢеҖјеҗҺжү§иЎҢдёҖж¬ЎзЎ®дҝқжӯЈзЎ®

        // дҝ®еӨҚеҮҪж•°иҰҶзӣ–
        diffButton.onclick = function() {
            renderDiff();
        };
    })();
</script>
<!-- зЎ®дҝқжёІжҹ“еҮҪж•°дёҖиҮҙжҖ§ -->
<script>
    // жңҖеҗҺеҶҚеҢ…иЈ…зЎ®дҝқrenderDiffжҳҜжңҖж–°зҡ„
    (function finalize() {
        const originalInput = document.getElementById('originalInput');
        const modifiedInput = document.getElementById('modifiedInput');
        const leftPanel = document.getElementById('leftPanel');
        const rightPanel = document.getElementById('rightPanel');
        const diffButton = document.getElementById('diffButton');

        // е®ҡд№үдё»еҮҪж•° (е·Із»ҸеӯҳеңЁпјҢдҪҶдёәйҒҝе…ҚеҶІзӘҒжҳҫејҸе®ҡд№ү)
        window.renderDiff = function() {
            const originalText = originalInput.value;
            const modifiedText = modifiedInput.value;
            const diffResult = Diff.diffLines(originalText, modifiedText);
            const leftRows = [];
            const rightRows = [];

            for (let i = 0; i < diffResult.length; i++) {
                const chunk = diffResult[i];
                if (!chunk.added && !chunk.removed) {
                    const lines = (chunk.value.split(/\r?\n/)).filter((line, idx, arr) => {
                        // дҝқз•ҷз©әиЎҢйҖ»иҫ‘пјҡдҪҶеҰӮжһңжңҖеҗҺдёҖйЎ№жҳҜз©әдё”еҺҹдёІдёҚз»“е°ҫжҚўиЎҢеҲҷеҺ»жҺүпјҢдёәдәҶйҮҚз”ЁеҶҷдёӘз®ҖеҚ•split
                        return true; // зЁҚеҗҺдҪҝз”ЁsplitLinesPreserveEmpty
                    });
                    // дҪҝз”Ёиҫ…еҠ©еҮҪж•°
                    const lines2 = splitLinesPreserveEmpty(chunk.value);
                    lines2.forEach(l => { leftRows.push(l); rightRows.push(l); });
                } else if (chunk.removed) {
                    const remLines = splitLinesPreserveEmpty(chunk.value);
                    let addLines = [];
                    if (i + 1 < diffResult.length && diffResult[i + 1].added) {
                        addLines = splitLinesPreserveEmpty(diffResult[i + 1].value);
                        i++;
                    }
                    const max = Math.max(remLines.length, addLines.length);
                    for (let j = 0; j < max; j++) {
                        leftRows.push(remLines[j] !== undefined ? remLines[j] : '');
                        rightRows.push(addLines[j] !== undefined ? addLines[j] : '');
                    }
                } else if (chunk.added) {
                    const addLines = splitLinesPreserveEmpty(chunk.value);
                    addLines.forEach(l => { leftRows.push(''); rightRows.push(l); });
                }
            }

            leftPanel.innerHTML = '';
            rightPanel.innerHTML = '';

            if (leftRows.length === 0) {
                leftRows.push(''); rightRows.push('');
            }

            for (let i = 0; i < leftRows.length; i++) {
                const leftText = leftRows[i];
                const rightText = rightRows[i];

                const leftRow = document.createElement('div');
                leftRow.className = 'line-row';
                const leftGutter = document.createElement('span');
                leftGutter.className = 'line-gutter';
                leftGutter.textContent = i + 1;
                leftRow.appendChild(leftGutter);
                const leftContent = document.createElement('span');
                leftContent.className = 'line-content';
                leftContent.textContent = leftText;
                leftRow.appendChild(leftContent);

                const rightRow = document.createElement('div');
                rightRow.className = 'line-row';
                const rightGutter = document.createElement('span');
                rightGutter.className = 'line-gutter';
                rightGutter.textContent = i + 1;
                rightRow.appendChild(rightGutter);
                const rightContent = document.createElement('span');
                rightContent.className = 'line-content';
                rightContent.textContent = rightText;
                rightRow.appendChild(rightContent);

                // й«ҳдә®йҖ»иҫ‘
                if (leftText !== '' && rightText === '') leftRow.classList.add('deleted');
                if (leftText === '' && rightText !== '') rightRow.classList.add('added');
                if (leftText !== '' && rightText !== '' && leftText !== rightText) {
                    leftRow.classList.add('deleted');
                    rightRow.classList.add('added');
                }

                leftPanel.appendChild(leftRow);
                rightPanel.appendChild(rightRow);
            }

            // йҮҚзҪ®ж»ҡеҠЁ
            leftPanel.scrollTop = 0;
            leftPanel.scrollLeft = 0;
            rightPanel.scrollTop = 0;
            rightPanel.scrollLeft = 0;
        };

        // дҝқиҜҒsplitLinesPreserveEmptyеңЁдҪңз”Ёеҹҹ
        function splitLinesPreserveEmpty(str) {
            if (str === '') return [];
            const lines = str.split(/\r?\n/);
            const endsWithNewline = str.endsWith('\n') || str.endsWith('\r\n');
            if (!endsWithNewline && lines.length > 0 && lines[lines.length-1] === '') {
                lines.pop();
            }
            return lines;
        }

        // з»‘е®ҡж»ҡеҠЁ (еӨҚз”Ёд№ӢеүҚзҡ„йҖ»иҫ‘)
        let lock = false;
        function syncScroll() {
            const left = document.getElementById('leftPanel');
            const right = document.getElementById('rightPanel');
            if (!left || !right) return;

            const leftHandler = function() { if (!lock) { lock = true; right.scrollTop = left.scrollTop; right.scrollLeft = left.scrollLeft; lock = false; } };
            const rightHandler = function() { if (!lock) { lock = true; left.scrollTop = right.scrollTop; left.scrollLeft = right.scrollLeft; lock = false; } };

            left.removeEventListener('scroll', left._scrollHandler);
            right.removeEventListener('scroll', right._scrollHandler);
            left._scrollHandler = leftHandler;
            right._scrollHandler = rightHandler;
            left.addEventListener('scroll', leftHandler);
            right.addEventListener('scroll', rightHandler);
        }

        window.addEventListener('load', function() {
            window.renderDiff();
            syncScroll();
        });
        diffButton.addEventListener('click', function() {
            window.renderDiff();
            syncScroll();
        });
    })();
</script>
